# Dependabot が作成した PR に対してレビュー依頼コメントを投稿するワークフロー
name: Dependabot Review Comment

on:
  pull_request:
    types: [opened, ready_for_review, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR番号'
        required: true
      ref:
        description: 'review-dependabot-pr.md を読むブランチ（default: main）'
        required: false
        default: 'main'

jobs:
  post-review-comment:
    if: github.actor == 'dependabot[bot]' || github.event_name == 'workflow_dispatch' # Dependabotのみ対象（手動実行時はスキップしない）
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      # GitHub App トークンの生成
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@7e473efe3cb98aa54f8d4bac15400b15fad77d94 # v2.2.0
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      # pull_request イベント: コメントを投稿して claude.yml をトリガー
      - name: Post review request comment
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "@claude /review-dependabot-pr"

      # workflow_dispatch: 指定ブランチを checkout して Claude を直接実行
      - name: Checkout specified ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      - name: Run Claude with specified branch's review-dependabot-pr.md
        if: github.event_name == 'workflow_dispatch'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "WebFetch,WebSearch,Bash(gh pr view:*),Bash(gh pr diff:*)"
          prompt: |
            `.claude/commands/review-dependabot-pr.md` の内容に従い、PR #${{ inputs.pr_number }} のレビューを行い、PR にコメントを投稿してください。
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}