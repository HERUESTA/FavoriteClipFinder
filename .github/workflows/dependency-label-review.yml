# dependencies ラベル付与時の依存関係影響分析ワークフロー
name: Dependency Label Review

on:
  pull_request:
    types: [labeled]

jobs:
  dependency-impact-analysis:
    # dependencies ラベルが付与された場合のみ実行
    if: github.event.label.name == 'dependencies'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Action
        id: analysis
        uses: anthropics/claude-code-action@6902c227aaa9536481b99d56f3014bbbad6c6da8
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,mcp__github__create_issue_comment"
          prompt: |
            /review-pr ${{ github.event.pull_request.number }}

