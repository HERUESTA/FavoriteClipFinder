# dependencies ラベル付与時の依存関係影響分析ワークフロー
name: Dependency Label Review

on:
  pull_request:
    types: [labeled]

jobs:
  dependency-impact-analysis:
    # dependencies ラベルが付与された場合のみ実行
    if: github.event.label.name == 'dependencies'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          allowed_bots: dependabot[bot]
          claude_args: |
            --allowedTools Bash Read Glob Grep WebFetch WebSearch mcp__github__create_issue_comment
          show_full_output: true
          prompt: |
            このPRの依存関係更新の影響を分析し、結果をPRにコメントしてください。

            ## 重要な制約
            - Task ツール（サブエージェント）は絶対に使用しないこと
            - すべての操作を自分で直接行うこと

            ## 手順（すべて自分で直接実行する）
            1. Read ツールで `.github/prompt/dependency-review.md` を読み込む
            2. そのファイルに記載されたレビューガイドラインに従って分析を行う
            3. Bash で `gh pr view ${{ github.event.pull_request.number }} --json title,body,files` を実行してPR情報を取得する
            4. WebFetch で CHANGELOG やリリースノートを調査する（必要な場合）
            5. Glob/Grep ツールでプロジェクトのコードを確認し、影響範囲を評価する
            6. 必ず mcp__github__create_issue_comment ツールを使って PR #${{ github.event.pull_request.number }} にコメントを投稿する

