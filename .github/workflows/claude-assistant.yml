name: Claude Assistant

on:
  workflow_dispatch: # 手動トリガー用
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude-assistant:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      # 書き込み用トークンを生成する
      - name: Generate write token
        id: write-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      # 参照用トークンを生成する
      - name: Generate read-only token
        id: read-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.GH_APP_ID_READ_ONLY }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY_READ_ONLY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            OshiPitch
            upgrade-releases

      - name: Checkout FavoriteClipFinder
        uses: actions/checkout@v4

      - name: Checkout OshiPitch (read-only)
        uses: actions/checkout@v4
        with:
          path: OshiPitch
          repository: HERUESTA/OshiPitch
          token: ${{ steps.read-token.outputs.token }}   # 参照用トークン
          ref: main

      - name: Checkout upgrade-releases (read-only)
        uses: actions/checkout@v4
        with:
          path: upgrade-releases
          repository: HERUESTA/upgrade-releases
          token: ${{ steps.read-token.outputs.token }}   # 参照用トークン
          ref: main

      - uses: anthropics/claude-code-action@0432df8bfe0572278dd19bca33be32cdc8061ebb # v1.0.87
        with:
          trigger_phrase: "@claude-all-repository"
          github_token: ${{ steps.write-token.outputs.token }}  # 書き込み用トークン
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          use_sticky_comment: "true"
          claude_args: |
            --append-system-prompt "重要: このワークスペースには複数のリポジトリがチェックアウトされています。書き込み（ファイルの作成・編集・削除・コミット・プッシュ）はルートディレクトリのファイルのみに限定してください。その他のリポジトリは参照専用として扱い、それらへの書き込みは一切行わないでください。"