name: Claude Assistant

on:
  workflow_dispatch: # 手動トリガー用
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude-assistant:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            FavoriteClipFinder
            OshiPitch

      - name: Checkout repository FavoriteClipFinder
        uses: actions/checkout@v4
      - name: Checkout repository OshiPitch
        uses: actions/checkout@v4
        with:
          path: OshiPitch # 異なるリポジトリをチェックアウトするパスを指定
          repository: HERUESTA/OshiPitch
          token: ${{ steps.app-token.outputs.token }}
          ref: main

      - uses: anthropics/claude-code-action@39431830520a7ae6c0c572f11a7707e7043325e3 # v1.0.97
        with:
          trigger_phrase: "@claude-all-repository"
          github_token: ${{ steps.app-token.outputs.token }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}